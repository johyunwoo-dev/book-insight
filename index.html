<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Insight</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/card.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <a class="logo" href="./index.html">Book Insight</a>
        <nav class="navigation">
          <ul class="nav-list">
            <li><a href="./index.html">홈</a></li>
            <li><a href="./insight.html">북 인사이트</a></li>
            <li><a href="./storage.html">보관함</a></li>
            <li><a href="./record.html">기록</a></li>
            <li><a href="./login.html">로그인</a></li>
          </ul>
        </nav>
        <button class="theme-toggle" type="button">☾</button>
      </div>
    </header>

    <main class="main-content">
      <section class="hero-section home-hero">
        <div class="container">
          <div class="hero-copy">
            <p class="hero-subtitle">좋았던 문장을 저장해보세요</p>
            <h1 class="hero-title">Book Insight</h1>
          </div>
          <aside class="question-panel">
            <p class="question-label">오늘의 질문</p>
            <h2 class="question-title" id="today-question">
              오늘 읽은 내용 중 가장 기억에 남는 부분은 무엇인가요?
            </h2>
          </aside>
        </div>
      </section>

      <section class="search-section">
        <div class="container search-layout">
          <div>
            <p class="section-kicker">탐색과 검색</p>
            <h2 class="section-title">책 찾아보기</h2>
          </div>
          <div class="search-box">
            <input
              type="text"
              class="search-input"
              placeholder="책 제목이나 태그를 검색하세요"
            />
            <button class="search-button" type="button">검색</button>
          </div>
          <div class="tag-list">
            <button class="tag-button" type="button">철학</button>
            <button class="tag-button" type="button">인간관계</button>
            <button class="tag-button" type="button">성장</button>
            <button class="tag-button" type="button">심리학</button>
          </div>
        </div>
      </section>

      <section class="preview-section">
        <div class="container">
          <div class="section-header">
            <p class="section-kicker">미리보기</p>
            <h2 class="section-title">북 인사이트</h2>
          </div>
          <div class="card-grid"></div>
        </div>
      </section>

      <section class="record-section home-record">
        <div class="container record-layout">
          <div class="record-intro">
            <p class="section-kicker">기록</p>
            <h2 class="section-title">한 줄 인사이트</h2>
            <p class="section-description">
              책을 읽으면서 든 생각을 간단히 적어보세요.
            </p>
            <a href="./record.html" class="text-link">기록 더 보기</a>
          </div>
          <div class="record-workspace">
            <div class="record-form">
              <textarea
                class="record-textarea"
                placeholder="예: 오늘 읽은 내용 중 가장 인상 깊었던 부분"
              ></textarea>
              <button class="record-button" type="button" disabled>
                기록 저장
              </button>
            </div>
            <div class="record-list compact-record-list"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-content">
        <p>© 2026 Book Insight</p>
      </div>
    </footer>

    <script src="./js/books.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/record.js"></script>
  </body>
</html>
