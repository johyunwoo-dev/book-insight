<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Insight - 북 인사이트</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/card.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <a class="logo" href="./index.html">Book Insight</a>
        <nav class="navigation">
          <ul class="nav-list">
            <li><a href="./index.html">홈</a></li>
            <li><a href="./insight.html">북 인사이트</a></li>
            <li><a href="./storage.html">보관함</a></li>
            <li><a href="./record.html">기록</a></li>
            <li><a href="./login.html">로그인</a></li>
          </ul>
        </nav>
        <button class="theme-toggle" type="button">☾</button>
      </div>
    </header>

    <main class="main-content">
      <section class="page-hero-section">
        <div class="container page-hero">
          <p class="hero-subtitle">책 속 문장 모음</p>
          <h1 class="hero-title">인사이트 목록</h1>
          <p class="hero-description">
            저장하고 싶은 문장을 찾아볼 수 있습니다.
          </p>
        </div>
      </section>

      <section class="search-section">
        <div class="container search-layout">
          <div class="search-box">
            <input
              type="text"
              class="search-input"
              placeholder="책 제목이나 태그를 검색하세요"
            />
            <button class="search-button" type="button">검색</button>
          </div>
          <div class="tag-list">
            <button class="tag-button" type="button">철학</button>
            <button class="tag-button" type="button">인간관계</button>
            <button class="tag-button" type="button">성장</button>
            <button class="tag-button" type="button">심리학</button>
          </div>
        </div>
      </section>

      <section class="insight-section">
        <div class="container">
          <div class="section-header">
            <p class="section-kicker">전체 목록</p>
            <h2 class="section-title">전체 인사이트</h2>
          </div>
          <div class="card-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-content">
        <p>© 2026 Book Insight</p>
      </div>
    </footer>

    <script src="./js/books.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
