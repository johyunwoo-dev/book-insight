<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Insight - 기록</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-content">
        <a class="logo" href="./index.html">Book Insight</a>
        <nav class="navigation">
          <ul class="nav-list">
            <li><a href="./index.html">홈</a></li>
            <li><a href="./insight.html">북 인사이트</a></li>
            <li><a href="./storage.html">보관함</a></li>
            <li><a href="./record.html">기록</a></li>
            <li><a href="./login.html">로그인</a></li>
          </ul>
        </nav>
        <button class="theme-toggle" type="button">☾</button>
      </div>
    </header>

    <main class="main-content">
      <section class="page-hero-section">
        <div class="container page-hero">
          <p class="hero-subtitle">독서 기록</p>
          <h1 class="hero-title">메모 작성</h1>
          <p class="hero-description">
            책을 읽고 기억하고 싶은 내용을 기록할 수 있습니다.
          </p>
        </div>
      </section>

      <section class="record-section">
        <div class="container">
          <div class="record-workspace">
            <div class="record-form">
              <textarea
                class="record-textarea"
                placeholder="읽은 내용을 자유롭게 작성해보세요."
              ></textarea>
              <button class="record-button" type="button" disabled>
                기록 저장
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="record-list-section">
        <div class="container">
          <div class="section-header">
            <p class="section-kicker">목록</p>
            <h2 class="section-title">남긴 기록</h2>
          </div>
          <div class="record-list"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-content">
        <p>© 2026 Book Insight</p>
      </div>
    </footer>

    <script src="./js/common.js"></script>
    <script src="./js/record.js"></script>
  </body>
</html>
